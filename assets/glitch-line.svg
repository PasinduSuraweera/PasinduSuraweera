<svg width="420" height="24" viewBox="0 0 420 24" xmlns="http://www.w3.org/2000/svg">
  <style>
    line { stroke: #fff; stroke-width: 1.5; }
  </style>
  <line x1="0" y1="12" x2="420" y2="12">
    <animate attributeName="opacity" values="1;0.2;1;0.5;1" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="12" x2="420" y2="12" opacity="0.5">
    <animate attributeName="transform" attributeType="XML" type="translate" values="0,0;2,0;-2,0;1,0;0,0" dur="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0;0.4;0" dur="0.6s" repeatCount="indefinite"/>
  </line>
</svg>
