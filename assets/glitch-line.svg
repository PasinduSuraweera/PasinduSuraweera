<svg width="420" height="24" viewBox="0 0 420 24" xmlns="http://www.w3.org/2000/svg">
  <style>
    line { stroke: #fff; stroke-width: 1.5; }
  </style>

  <!-- base line, fast flicker -->
  <line x1="0" y1="12" x2="420" y2="12">
    <animate attributeName="opacity" values="1;0.2;1;0.6;0.3;1;0.5;1" dur="0.7s" repeatCount="indefinite"/>
  </line>

  <!-- ghost 1: jitters right -->
  <line x1="0" y1="12" x2="420" y2="12" opacity="0.6">
    <animate attributeName="transform" attributeType="XML" type="translate" values="0,0;3,-1;-2,1;2,0;-1,-1;0,0" dur="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0;0.5;0;0.4;0" dur="0.45s" repeatCount="indefinite"/>
  </line>

  <!-- ghost 2: jitters left, offset timing -->
  <line x1="0" y1="12" x2="420" y2="12" opacity="0.4">
    <animate attributeName="transform" attributeType="XML" type="translate" values="0,0;-3,1;2,-1;-1,1;0,0" dur="0.35s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0;0.6;0;0.3;0" dur="0.55s" repeatCount="indefinite"/>
  </line>

  <!-- slicing block: a short segment that flickers across -->
  <line x1="0" y1="12" x2="60" y2="12" stroke-width="2.5">
    <animate attributeName="x1" values="0;360;120;420;0" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="60;420;180;480;60" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0;1;0" dur="0.5s" repeatCount="indefinite"/>
  </line>
</svg>
